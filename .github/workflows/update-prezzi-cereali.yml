name: Aggiorna prezzi cereali TEST

on:
  schedule:
    - cron: "55 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pdfplumber

      - run: python scripts/update_prezzi_cereali.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Aggiorna prezzi cereali"
          file_pattern: data/prezzi-cereali.json
