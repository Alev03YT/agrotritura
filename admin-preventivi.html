<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AgroTritura | Preventivi</title><link rel="icon" href="favicon.jpg">
<style>
:root{--g:#2e5d2e;--l:#dfe8d7;--bg:#f4f8f1}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:#1f2a1f}.top{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--l);padding:12px;z-index:5}.topin{max-width:900px;margin:auto;display:flex;justify-content:space-between;align-items:center}.brand{display:flex;gap:10px;align-items:center}.brand img{width:48px;height:48px;border-radius:10px}.brand b{font-size:22px;color:var(--g)}main{max-width:900px;margin:auto;padding:14px 14px 100px}.card{background:#fff;border:1px solid var(--l);border-radius:18px;padding:16px;margin:14px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}label{display:block;font-weight:700;font-size:13px;margin-bottom:5px}input,select,textarea{width:100%;padding:12px;border:1px solid #cad8c3;border-radius:11px;font-size:16px}textarea{min-height:85px}.btn{border:0;border-radius:12px;padding:12px 15px;font-weight:800;font-size:15px}.green{background:var(--g);color:#fff}.soft{background:#e7f0e2;color:var(--g)}.danger{background:#fff0ee;color:#b42318}.product{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;align-items:end;padding:10px;border:1px solid var(--l);border-radius:13px;margin-bottom:9px}.sum{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--l)}.total{font-size:23px;font-weight:900;color:var(--g)}.bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--l);padding:10px;z-index:8}.barin{max-width:900px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}.hidden{display:none!important}.preview{overflow:auto}.page{width:760px;max-width:100%;margin:auto;background:#fff;padding:22px;color:#172017}.head{display:flex;justify-content:space-between;gap:15px;border-bottom:3px solid var(--g);padding-bottom:12px}.headbrand{display:flex;gap:10px;align-items:center}.headbrand img{width:58px;height:58px;border-radius:9px}.head h1{margin:0;color:var(--g)}.info{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}.box{border:1px solid var(--l);border-radius:10px;padding:10px}table{width:100%;border-collapse:collapse;margin:12px 0}th{background:var(--g);color:#fff;text-align:left;padding:8px}td{padding:8px;border-bottom:1px solid var(--l)}.totals{max-width:340px;margin-left:auto}.notes{border:1px solid var(--l);border-radius:10px;padding:10px;white-space:pre-wrap;margin-top:12px}.login{max-width:390px;margin:35px auto}.archiveItem{border:1px solid var(--l);border-radius:12px;padding:10px;margin:8px 0}
@media(max-width:650px){.grid,.product,.info{grid-template-columns:1fr}.head{display:block}.head>div:last-child{margin-top:10px}.page{padding:14px}}
@page{size:A4;margin:8mm}
@media print{
 body{background:#fff}
 body *{visibility:hidden!important}
 #printSection,#printSection *{visibility:visible!important}
 #printSection{position:absolute!important;left:0!important;top:0!important;width:100%!important;margin:0!important;padding:0!important;border:0!important}
 #preview{overflow:visible!important;border:0!important;padding:0!important}
 .page{width:100%!important;max-width:none!important;padding:0!important;margin:0!important}
 .noPrint{display:none!important}
 .head{display:flex!important}.info{display:grid!important;grid-template-columns:1fr 1fr!important}
}
</style></head>
<body>
<header class="top"><div class="topin"><div class="brand"><img src="img/IMG-20260216-WA0000.jpg"><div><b>AgroTritura</b><br><small>Generatore preventivi</small></div></div><button id="logout" class="btn soft">Esci</button></div></header>
<main>
<section id="login" class="card login"><h2>Accesso</h2><label>PIN</label><input id="pin" type="password" inputmode="numeric"><button id="enter" class="btn green" style="width:100%;margin-top:10px">Entra</button></section>
<section id="app" class="hidden">
<div class="card"><h2>Cliente</h2><div class="grid"><div><label>Nome / Azienda</label><input id="cliente"></div><div><label>Telefono</label><input id="telefono"></div><div><label>Indirizzo</label><input id="indirizzo"></div><div><label>Destinazione</label><input id="destinazione"></div><div><label>Consegna</label><select id="consegna"><option>A domicilio</option><option>Ritiro in sede</option><option>Da definire</option></select></div><div><label>Granulometria</label><select id="granulometria"><option>Da definire</option><option>Fine</option><option>Media</option><option>Grossa</option></select></div></div></div>
<div class="card"><h2>Prodotti</h2><div id="products"></div><button id="add" class="btn soft">+ Aggiungi prodotto</button></div>
<div class="card"><h2>Trasporto e note</h2><div class="grid"><div><label>Distanza sola andata (km)</label><input id="km" type="number" step="0.1"></div><div><label>Trasporto A/R (€)</label><input id="trasporto" type="number" step="0.01" value="0"></div></div><label style="margin-top:12px">Note aggiuntive</label><textarea id="note"></textarea></div>
<div class="card"><div class="sum"><span>Totale merce</span><b id="merce">€ 0,00</b></div><div class="sum"><span>Trasporto</span><b id="tr">€ 0,00</b></div><div class="sum total"><span>TOTALE</span><span id="tot">€ 0,00</span></div></div>
<section id="printSection" class="card"><h2 class="noPrint">Anteprima PDF</h2><div id="preview" class="preview"></div></section>
<div class="card noPrint"><h2>Archivio sul telefono</h2><button id="save" class="btn soft">Salva</button> <button id="newq" class="btn soft">Nuovo</button><div id="archive"></div></div>
</section></main>
<div id="bar" class="bar hidden"><div class="barin"><button id="pdf" class="btn green">📄 Genera PDF</button><button id="wa" class="btn soft">📲 WhatsApp</button></div></div>
<script>
(()=>{const $=id=>document.getElementById(id),eur=n=>(+n||0).toLocaleString('it-IT',{style:'currency',currency:'EUR'}),prices={'Mais':.60,'Orzo':.60,'Frumento':.62,'Grana verde':.65,'Mix personalizzato':.65};let current='';
function number(){if(current)return current;let k='agro_counter_'+new Date().getFullYear(),n=(+localStorage.getItem(k)||0)+1;localStorage.setItem(k,n);return current=`AT-${new Date().getFullYear()}-${String(n).padStart(4,'0')}`}
function add(d={}){let x=document.createElement('div');x.className='product';x.innerHTML=`<div><label>Prodotto</label><select class="p">${Object.keys(prices).map(p=>`<option ${d.p==p?'selected':''}>${p}</option>`).join('')}</select></div><div><label>Quantità kg</label><input class="q" type="number" value="${d.q||''}"></div><div><label>Prezzo €/kg</label><input class="pr" type="number" step="0.01" value="${d.pr??''}"></div><button class="btn danger del">Elimina</button>`;$('products').appendChild(x);let s=x.querySelector('.p'),p=x.querySelector('.pr');if(!p.value)p.value=prices[s.value];s.onchange=()=>{p.value=prices[s.value];render()};x.querySelector('.del').onclick=()=>{x.remove();render()};x.querySelectorAll('input,select').forEach(e=>e.oninput=render);render()}
function data(){let rows=[...document.querySelectorAll('.product')].map(x=>({p:x.querySelector('.p').value,q:+x.querySelector('.q').value||0,pr:+x.querySelector('.pr').value||0})).filter(x=>x.q);let merce=rows.reduce((a,r)=>a+r.q*r.pr,0),tr=+$('trasporto').value||0;return{numero:number(),cliente:$('cliente').value,telefono:$('telefono').value,indirizzo:$('indirizzo').value,destinazione:$('destinazione').value,consegna:$('consegna').value,granulometria:$('granulometria').value,km:$('km').value,note:$('note').value,rows,merce,tr,tot:merce+tr}}
function render(){let d=data(),mix=d.rows.map(r=>`${r.q} kg ${r.p}`).join(' + ')||'Da compilare';$('merce').textContent=eur(d.merce);$('tr').textContent=eur(d.tr);$('tot').textContent=eur(d.tot);let note=`${d.note?d.note+'\n':''}COMPOSIZIONE MIX: ${mix}\nCONSEGNA: ${d.consegna}\nDESTINAZIONE: ${d.destinazione||'Da definire'}${d.km?'\nDistanza sola andata: '+d.km+' km':''}\nGranulometria: ${d.granulometria}\n\nMangime fresco tritato su misura.`;$('preview').innerHTML=`<div class="page"><div class="head"><div class="headbrand"><img src="img/IMG-20260216-WA0000.jpg"><div><b style="font-size:24px;color:#2e5d2e">AgroTritura</b><br>Mangime fresco tritato su misura</div></div><div><h1>Preventivo</h1>Data ${new Date().toLocaleDateString('it-IT')}<br>N° <b>${d.numero}</b></div></div><div class="info"><div class="box"><b>Nome / Azienda</b><br>${d.cliente||'-'}<br><br><b>Telefono</b><br>${d.telefono||'-'}</div><div class="box"><b>Indirizzo</b><br>${d.indirizzo||'-'}<br><br><b>Consegna</b><br>${d.consegna}</div></div><table><thead><tr><th>Prodotto</th><th>Quantità</th><th>Prezzo/kg</th><th>Totale</th></tr></thead><tbody>${d.rows.map(r=>`<tr><td><b>${r.p.toUpperCase()}</b></td><td>${r.q} kg</td><td>${eur(r.pr)}</td><td>${eur(r.q*r.pr)}</td></tr>`).join('')}</tbody></table><div class="totals"><div class="sum"><span>Totale merce</span><b>${eur(d.merce)}</b></div><div class="sum"><span>Trasporto A/R</span><b>${eur(d.tr)}</b></div><div class="sum total"><span>TOTALE</span><span>${eur(d.tot)}</span></div></div><div class="notes"><b>Note</b>\n${note}</div></div>`}
function show(){ $('login').classList.add('hidden');$('app').classList.remove('hidden');$('bar').classList.remove('hidden');render();archive() }function reset(){['cliente','telefono','indirizzo','destinazione','km','note'].forEach(i=>$(i).value='');$('trasporto').value=0;$('products').innerHTML='';current='';add({p:'Mais',q:65});add({p:'Frumento',q:25});add({p:'Orzo',q:10});render()}
$('enter').onclick=()=>{$('pin').value==='2026'?(localStorage.setItem('agro_ok','1'),show()):alert('PIN errato')};$('logout').onclick=()=>{localStorage.removeItem('agro_ok');location.reload()};$('add').onclick=()=>add();document.querySelectorAll('input,select,textarea').forEach(e=>e.oninput=render);$('pdf').onclick=()=>{render();setTimeout(()=>window.print(),150)};$('wa').onclick=()=>{let d=data(),t=`Preventivo AgroTritura ${d.numero}\nCliente: ${d.cliente}\n\n${d.rows.map(r=>`- ${r.p}: ${r.q} kg = ${eur(r.q*r.pr)}`).join('\n')}\n\nTOTALE: ${eur(d.tot)}`;open('https://wa.me/?text='+encodeURIComponent(t),'_blank')};$('save').onclick=()=>{let a=JSON.parse(localStorage.getItem('agro_quotes')||'[]'),d=data();d.savedAt=Date.now();a.unshift(d);localStorage.setItem('agro_quotes',JSON.stringify(a.slice(0,50)));archive();alert('Salvato')};$('newq').onclick=reset;
function archive(){let a=JSON.parse(localStorage.getItem('agro_quotes')||'[]');$('archive').innerHTML=a.map((q,i)=>`<div class="archiveItem"><b>${q.numero} - ${q.cliente||'Cliente'}</b><br><small>${eur(q.tot)}</small><br><button class="btn soft openq" data-i="${i}">Apri</button> <button class="btn danger delq" data-i="${i}">Elimina</button></div>`).join('');document.querySelectorAll('.openq').forEach(b=>b.onclick=()=>load(a[b.dataset.i]));document.querySelectorAll('.delq').forEach(b=>b.onclick=()=>{a.splice(b.dataset.i,1);localStorage.setItem('agro_quotes',JSON.stringify(a));archive()})}
function load(q){current=q.numero;['cliente','telefono','indirizzo','destinazione','km','note'].forEach(i=>$(i).value=q[i]||'');$('consegna').value=q.consegna||'A domicilio';$('granulometria').value=q.granulometria||'Da definire';$('trasporto').value=q.tr||0;$('products').innerHTML='';q.rows.forEach(add);render();scrollTo(0,0)}
add({p:'Mais',q:65});add({p:'Frumento',q:25});add({p:'Orzo',q:10});localStorage.getItem('agro_ok')==='1'?show():$('logout').classList.add('hidden');render();})();
</script></body></html>
